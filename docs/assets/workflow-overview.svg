<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .title { font-size: 11px; font-weight: 600; fill: #1f2328; }
    .subtitle { font-size: 9px; fill: #59636e; }
    .box { rx: 8; stroke-width: 1.5; }
    .arrow { stroke: #d1d9e0; stroke-width: 1.5; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#d1d9e0" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" rx="12" fill="#ffffff" stroke="#e1e7ec" stroke-width="1"/>

  <!-- Stage 1: Capture -->
  <rect x="20" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="70" y="90" text-anchor="middle" class="title">Capture</text>
  <text x="70" y="105" text-anchor="middle" class="subtitle">Brief + Assets</text>

  <!-- Arrow -->
  <line x1="120" y1="95" x2="145" y2="95" class="arrow"/>

  <!-- Stage 2: Generate -->
  <rect x="145" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="195" y="90" text-anchor="middle" class="title">Generate</text>
  <text x="195" y="105" text-anchor="middle" class="subtitle">Provider Broker</text>

  <line x1="245" y1="95" x2="270" y2="95" class="arrow"/>

  <!-- Stage 3: Polish -->
  <rect x="270" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="320" y="90" text-anchor="middle" class="title">Polish</text>
  <text x="320" y="105" text-anchor="middle" class="subtitle">Caption + Style</text>

  <line x1="370" y1="95" x2="395" y2="95" class="arrow"/>

  <!-- Stage 4: Brand -->
  <rect x="395" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="445" y="90" text-anchor="middle" class="title">Brand</text>
  <text x="445" y="105" text-anchor="middle" class="subtitle">Preset Engine</text>

  <line x1="495" y1="95" x2="520" y2="95" class="arrow"/>

  <!-- Stage 5: Export -->
  <rect x="520" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="570" y="90" text-anchor="middle" class="title">Export</text>
  <text x="570" y="105" text-anchor="middle" class="subtitle">Platform Pack</text>

  <line x1="620" y1="95" x2="645" y2="95" class="arrow"/>

  <!-- Stage 6: QA -->
  <rect x="645" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="695" y="90" text-anchor="middle" class="title">QA / Eval</text>
  <text x="695" y="105" text-anchor="middle" class="subtitle">Quality Gate</text>

  <line x1="745" y1="95" x2="770" y2="95" class="arrow"/>

  <!-- Stage 7: Publish -->
  <rect x="770" y="60" width="100" height="70" class="box" fill="#ddf4ff" stroke="#b6d7f8"/>
  <text x="820" y="90" text-anchor="middle" class="title">Publish</text>
  <text x="820" y="105" text-anchor="middle" class="subtitle">Handoff</text>

  <line x1="870" y1="95" x2="895" y2="95" class="arrow"/>

  <!-- Stage 8: Analytics -->
  <rect x="895" y="60" width="50" height="70" class="box" fill="#eff2f5" stroke="#d1d9e0"/>
  <text x="920" y="90" text-anchor="middle" class="title" font-size="10">Stats</text>
  <text x="920" y="105" text-anchor="middle" class="subtitle" font-size="8">KPIs</text>

  <!-- Provider row -->
  <text x="20" y="175" class="title" fill="#59636e">Providers</text>

  <rect x="90" y="160" width="85" height="40" class="box" fill="#f6f8fa" stroke="#d1d9e0"/>
  <text x="132" y="183" text-anchor="middle" class="title">fal.ai</text>

  <rect x="185" y="160" width="85" height="40" class="box" fill="#f6f8fa" stroke="#d1d9e0"/>
  <text x="227" y="183" text-anchor="middle" class="title">Gemini</text>

  <rect x="280" y="160" width="85" height="40" class="box" fill="#f6f8fa" stroke="#d1d9e0"/>
  <text x="322" y="183" text-anchor="middle" class="title">Imagen</text>

  <rect x="375" y="160" width="85" height="40" class="box" fill="#f6f8fa" stroke="#d1d9e0"/>
  <text x="417" y="183" text-anchor="middle" class="title">OpenAI</text>

  <!-- Platform row -->
  <text x="20" y="240" class="title" fill="#59636e">Platforms</text>

  <rect x="90" y="225" width="70" height="30" rx="15" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="125" y="244" text-anchor="middle" class="subtitle">TikTok</text>

  <rect x="170" y="225" width="70" height="30" rx="15" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="205" y="244" text-anchor="middle" class="subtitle">Reels</text>

  <rect x="250" y="225" width="70" height="30" rx="15" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="285" y="244" text-anchor="middle" class="subtitle">Shorts</text>

  <rect x="330" y="225" width="80" height="30" rx="15" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="370" y="244" text-anchor="middle" class="subtitle">YouTube</text>

  <!-- Title -->
  <text x="480" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">ugc-mediaops-kit — Workflow Overview</text>
</svg>
